name: Release — Test, Build, Publish, Deploy

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

env:
  IMAGE_TAG: ${{ github.event.release.tag_name }}
  MONGODB_URI: ${{ secrets.MONGODB_URI }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  JWT_EXPIRES: ${{ secrets.JWT_EXPIRES }}

jobs:
  test-node:
    name: Run node unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [webapp, users, gateway, authentication]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd ${{ matrix.service }}
          npm ci

      - name: Run tests
        run: |
          cd ${{ matrix.service }}
          npm test
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

  test-rust:
    name: Run rust (gamey) tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: |
          cd gamey
          cargo test

  e2e:
    name: Run E2E tests
    runs-on: ubuntu-latest
    needs: [test-node, test-rust]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install users dependencies
        run: |
          cd users
          npm ci
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
      - name: Install gateway dependencies
        run: |
          cd gateway
          npm ci
      - name: Install webapp dependencies
        run: |
          cd webapp
          npm ci
      - name: Install Playwright browsers
        run: |
          cd webapp
          npm run test:e2e:install-browsers
      - name: Run E2E tests (start servers and run cucumber)
        run: |
          cd webapp
          npm run test:e2e
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          VITE_API_URL: http://localhost:8080
          NODE_TLS_REJECT_UNAUTHORIZED: "0"

  docker-push-users:
    name: Publish users image
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Registry (users)
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-users
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: users
          buildargs: | 
            MONGODB_URI=${{ secrets.MONGODB_URI }}

  docker-push-authentication:
    name: Publish authentication image
    runs-on: ubuntu-latest
    needs: e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish authentication
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-authentication
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: authentication

  docker-push-gateway:
    name: Publish gateway image
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Registry (gateway)
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-gateway
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: gateway

  docker-push-webapp:
    name: Publish webapp image
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Registry (webapp)
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-webapp
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: webapp
          buildargs: VITE_API_URL=http://${{ secrets.DEPLOY_HOST }}:8080

  docker-push-gamey:
    name: Publish gamey image
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Registry (gamey)
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-gamey
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: gamey

  deploy:
    name: Deploy over SSH
    runs-on: ubuntu-latest
    needs: [docker-push-users, docker-push-webapp, docker-push-gamey, docker-push-gateway]
    steps:
      - name: Deploy over SSH
        uses: fifsky/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          user: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          command: |
            wget https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/master/docker-compose.yml -O docker-compose.yml
            echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" > .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            docker-compose down
            docker-compose up -d --pull always
            

  load-test:
    name: Run Gatling load tests
    runs-on: ubuntu-latest
    needs: deploy
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Wait for services to be ready
        run: sleep 30

      - name: Run Gatling simulation
        run: |
          chmod +x gatling/bin/gatling.sh
          gatling/bin/gatling.sh -s gateway.GatewayFullSimulation -nr
        env:
          GATLING_HOME: ${{ github.workspace }}/gatling

      - name: Upload Gatling reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gatling-reports
          path: gatling/results/
