<!DOCTYPE html>
<html>
<head>
    <title>GameOfY API Docs</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist/swagger-ui.css" />
</head>
<body>
<div id="swagger-ui"></div>

<script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>
<script>
    SwaggerUIBundle({
        urls: [
            { url: "./bot-api.yaml",   name: "Bot API" },
            { url: "./openapi.yaml",   name: "Gateway API" },
        ],
        "urls.primaryName": "Gateway API",  // which one opens by default
        dom_id: '#swagger-ui',
        presets: [
            SwaggerUIBundle.presets.apis,
            SwaggerUIBundle.SwaggerUIStandalonePreset
        ],
    });
</script>
</body>
</html>
