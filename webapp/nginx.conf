server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ✅ SPA fallback (THIS is the key fix)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # optional: caching for assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}